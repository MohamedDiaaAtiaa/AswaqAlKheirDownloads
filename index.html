<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Aswaq Al Khair Apps</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>أسواق الخير</h1>
            <p class="subtitle">Click below to download the application for your device.</p>
        </header>

        <main class="download-grid">
            <!-- Customer App -->
            <section class="download-card">
                <span class="card-label">Customer App</span>
                <h2 class="card-title">Mobile Application</h2>
                <a href="#" id="customer-download" class="download-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download Now
                </a>
            </section>

            <!-- Admin App -->
            <section class="download-card">
                <span class="card-label">Admin App</span>
                <h2 class="card-title">Management App</h2>
                <a href="#" id="admin-download" class="download-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download Now
                </a>
            </section>

            <!-- Windows App -->
            <section class="download-card">
                <span class="card-label">Windows Dashboard</span>
                <h2 class="card-title">Desktop Admin</h2>
                <a href="Aswaq Al Khair admin 1.0.0.exe" download class="download-btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    Download .exe
                </a>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
